<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spotify Clone</title>
<link href="https://fonts.googleapis.com/css2?family=Circular+Std:wght@400;500;700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1DB954;
    --green-bright: #1ed760;
    --green-dim: #158a3e;
    --black: #000000;
    --bg-base: #121212;
    --bg-elevated: #1A1A1A;
    --bg-highlight: #282828;
    --bg-press: #3E3E3E;
    --text-base: #FFFFFF;
    --text-subdued: #A7A7A7;
    --text-bright: #FFFFFF;
    --sidebar-width: 240px;
    --player-height: 90px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--black);
    color: var(--text-base);
    height: 100vh;
    overflow: hidden;
    display: grid;
    grid-template-columns: var(--sidebar-width) 1fr;
    grid-template-rows: 1fr var(--player-height);
    grid-template-areas:
      "sidebar main"
      "player player";
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    grid-area: sidebar;
    background: var(--black);
    display: flex;
    flex-direction: column;
    padding: 24px 12px 0;
    overflow: hidden;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    margin-bottom: 28px;
  }

  .logo svg { width: 32px; height: 32px; fill: white; }

  .logo-text {
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 20px;
    letter-spacing: -0.5px;
    color: #fff;
  }

  .nav-section { padding: 0 12px; margin-bottom: 24px; }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 8px 0;
    color: var(--text-subdued);
    cursor: pointer;
    border-radius: 4px;
    transition: color 0.15s;
    font-weight: 600;
    font-size: 15px;
    text-decoration: none;
  }

  .nav-item:hover, .nav-item.active { color: var(--text-base); }
  .nav-item.active svg { fill: white; }

  .nav-item svg {
    width: 24px; height: 24px;
    fill: var(--text-subdued);
    transition: fill 0.15s;
    flex-shrink: 0;
  }

  .nav-item:hover svg { fill: white; }

  .divider {
    height: 1px;
    background: #282828;
    margin: 8px 12px 16px;
  }

  .library-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    margin-bottom: 12px;
  }

  .library-title {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-subdued);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.15s;
  }

  .library-title:hover { color: white; }
  .library-title svg { width: 22px; height: 22px; fill: currentColor; }

  .library-action {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-subdued);
    cursor: pointer;
    transition: all 0.15s;
  }

  .library-action:hover { background: var(--bg-highlight); color: white; }
  .library-action svg { width: 16px; height: 16px; fill: currentColor; }

  .playlist-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 4px;
    scrollbar-width: thin;
    scrollbar-color: #555 transparent;
  }

  .playlist-list::-webkit-scrollbar { width: 6px; }
  .playlist-list::-webkit-scrollbar-track { background: transparent; }
  .playlist-list::-webkit-scrollbar-thumb { background: #555; border-radius: 3px; }

  .playlist-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .playlist-item:hover { background: var(--bg-highlight); }

  .playlist-item.active { background: var(--bg-highlight); }

  .playlist-cover {
    width: 48px; height: 48px;
    border-radius: 4px;
    flex-shrink: 0;
    object-fit: cover;
  }

  .playlist-cover-placeholder {
    width: 48px; height: 48px;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .playlist-info { min-width: 0; }

  .playlist-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-base);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .playlist-item.active .playlist-name { color: var(--green); }

  .playlist-meta {
    font-size: 12px;
    color: var(--text-subdued);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ===== MAIN ===== */
  .main {
    grid-area: main;
    background: var(--bg-base);
    overflow-y: auto;
    position: relative;
    scrollbar-width: thin;
    scrollbar-color: #555 transparent;
  }

  .main::-webkit-scrollbar { width: 8px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }

  /* Header */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    transition: background 0.3s;
    background: transparent;
  }

  .topbar.scrolled {
    background: rgba(18,18,18,0.95);
    backdrop-filter: blur(12px);
  }

  .nav-arrows {
    display: flex;
    gap: 8px;
  }

  .arrow-btn {
    width: 32px; height: 32px;
    background: rgba(0,0,0,0.7);
    border: none;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.15s;
  }

  .arrow-btn:hover { background: rgba(255,255,255,0.1); }
  .arrow-btn svg { width: 16px; height: 16px; fill: white; }

  .search-bar {
    flex: 1;
    max-width: 360px;
    margin: 0 24px;
    position: relative;
  }

  .search-bar input {
    width: 100%;
    padding: 10px 16px 10px 44px;
    background: white;
    border: none;
    border-radius: 500px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: #000;
    outline: none;
    transition: transform 0.1s;
  }

  .search-bar input:focus { transform: scale(1.01); }

  .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    width: 18px; height: 18px;
    fill: #121212;
    pointer-events: none;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .upgrade-btn {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--text-subdued);
    border-radius: 500px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .upgrade-btn:hover { border-color: white; transform: scale(1.04); }

  .user-avatar {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #535353, #282828);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-weight: 700;
    font-size: 13px;
    color: white;
    transition: transform 0.15s;
  }

  .user-avatar:hover { transform: scale(1.08); }

  /* Hero Section */
  .hero {
    min-height: 380px;
    background: linear-gradient(180deg, #2a4858 0%, #1a3040 30%, var(--bg-base) 100%);
    padding: 32px 32px 24px;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(29,185,84,0.15) 0%, transparent 60%);
    pointer-events: none;
  }

  .greeting {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 24px;
    letter-spacing: -0.5px;
  }

  .quick-picks {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }

  .quick-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.1);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    group: true;
  }

  .quick-card:hover { background: rgba(255,255,255,0.2); }

  .quick-card:hover .play-overlay { opacity: 1; transform: translateY(0); }

  .quick-thumb {
    width: 80px; height: 80px;
    object-fit: cover;
    flex-shrink: 0;
  }

  .quick-thumb-placeholder {
    width: 80px; height: 80px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .quick-title {
    font-size: 14px;
    font-weight: 700;
    flex: 1;
    padding-right: 8px;
  }

  .play-overlay {
    position: absolute;
    right: 16px;
    width: 40px; height: 40px;
    background: var(--green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  .play-overlay svg { width: 18px; height: 18px; fill: black; margin-left: 2px; }

  /* Sections */
  .content-area { padding: 0 32px 32px; }

  .section { margin-bottom: 40px; }

  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.3px;
    cursor: pointer;
  }

  .section-title:hover { text-decoration: underline; }

  .see-all {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-subdued);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: color 0.15s;
  }

  .see-all:hover { color: white; text-decoration: underline; }

  .cards-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 24px;
  }

  .card {
    background: var(--bg-highlight);
    border-radius: 8px;
    padding: 16px;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
    overflow: visible;
  }

  .card:hover { background: #333; }
  .card:hover .card-play { opacity: 1; transform: translateY(0); }

  .card-img-wrap {
    position: relative;
    margin-bottom: 16px;
  }

  .card-img {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 6px;
    object-fit: cover;
  }

  .card-img-placeholder {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }

  .card.artist .card-img,
  .card.artist .card-img-placeholder {
    border-radius: 50%;
  }

  .card-play {
    position: absolute;
    bottom: 8px; right: 8px;
    width: 48px; height: 48px;
    background: var(--green);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.2s, transform 0.2s;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }

  .card-play svg { width: 20px; height: 20px; fill: black; margin-left: 3px; }

  .card-name {
    font-size: 15px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .card-desc {
    font-size: 13px;
    color: var(--text-subdued);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.5;
  }

  /* Featured Row */
  .featured-row {
    display: grid;
    grid-template-columns: 1.6fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 40px;
  }

  .featured-card {
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    aspect-ratio: 16/9;
  }

  .featured-card:first-child { aspect-ratio: 16/10; }

  .featured-bg {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
  }

  .featured-card:hover .featured-bg { transform: scale(1.04); }

  .featured-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 60%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px;
  }

  .featured-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--green);
    margin-bottom: 6px;
  }

  .featured-title {
    font-size: 20px;
    font-weight: 700;
    line-height: 1.2;
  }

  .featured-card:not(:first-child) .featured-title { font-size: 15px; }

  /* ===== PLAYER ===== */
  .player {
    grid-area: player;
    background: #181818;
    border-top: 1px solid #282828;
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
  }

  /* Now Playing */
  .now-playing {
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 0;
  }

  .np-art {
    width: 56px; height: 56px;
    border-radius: 4px;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }

  .np-art-placeholder {
    width: 56px; height: 56px;
    border-radius: 4px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }

  .np-art::after {
    content: '';
    position: absolute; inset: 0;
    background: rgba(0,0,0,0);
    transition: background 0.2s;
  }

  .np-art:hover::after { background: rgba(0,0,0,0.3); }

  .np-info { min-width: 0; }

  .np-title {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
  }

  .np-title:hover { text-decoration: underline; }

  .np-artist {
    font-size: 12px;
    color: var(--text-subdued);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    margin-top: 3px;
  }

  .np-artist:hover { color: white; text-decoration: underline; }

  .np-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .like-btn { cursor: pointer; }
  .like-btn svg { width: 16px; height: 16px; fill: var(--text-subdued); transition: fill 0.15s; }
  .like-btn:hover svg { fill: white; }
  .like-btn.liked svg { fill: var(--green); }

  /* Controls */
  .controls {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .control-btns {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .ctrl-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    padding: 4px;
    border-radius: 50%;
    transition: transform 0.15s;
  }

  .ctrl-btn svg { width: 16px; height: 16px; fill: var(--text-subdued); transition: fill 0.15s; }
  .ctrl-btn:hover svg { fill: white; }
  .ctrl-btn.active svg { fill: var(--green); }

  .play-btn {
    width: 40px; height: 40px;
    background: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    border: none;
    flex-shrink: 0;
  }

  .play-btn:hover { transform: scale(1.08); background: #f0f0f0; }
  .play-btn svg { width: 18px; height: 18px; fill: black; margin-left: 2px; }
  .play-btn.playing svg { margin-left: 0; }

  .progress-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 520px;
  }

  .time {
    font-size: 11px;
    color: var(--text-subdued);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    min-width: 30px;
  }

  .time:last-child { text-align: right; }

  .progress-track {
    flex: 1;
    height: 4px;
    background: #535353;
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    transition: height 0.1s;
  }

  .progress-track:hover { height: 6px; }

  .progress-fill {
    height: 100%;
    background: white;
    border-radius: 2px;
    position: relative;
    width: 32%;
    transition: background 0.2s;
  }

  .progress-track:hover .progress-fill { background: var(--green); }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: -6px; top: 50%;
    transform: translateY(-50%);
    width: 12px; height: 12px;
    background: white;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.1s;
  }

  .progress-track:hover .progress-fill::after { opacity: 1; }

  /* Volume */
  .volume-area {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
  }

  .vol-btn {
    background: none; border: none; cursor: pointer; padding: 4px;
  }

  .vol-btn svg { width: 16px; height: 16px; fill: var(--text-subdued); transition: fill 0.15s; }
  .vol-btn:hover svg { fill: white; }

  .vol-track {
    width: 93px; height: 4px;
    background: #535353;
    border-radius: 2px;
    cursor: pointer;
    position: relative;
    transition: height 0.1s;
  }

  .vol-track:hover { height: 6px; }

  .vol-fill {
    height: 100%;
    background: white;
    border-radius: 2px;
    width: 65%;
    transition: background 0.2s;
    position: relative;
  }

  .vol-track:hover .vol-fill { background: var(--green); }

  .vol-fill::after {
    content: '';
    position: absolute;
    right: -6px; top: 50%;
    transform: translateY(-50%);
    width: 12px; height: 12px;
    background: white;
    border-radius: 50%;
    opacity: 0;
    transition: opacity 0.1s;
  }

  .vol-track:hover .vol-fill::after { opacity: 1; }

  .extra-btns {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .extra-btn {
    background: none; border: none; cursor: pointer;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    transition: background 0.15s;
  }

  .extra-btn:hover { background: rgba(255,255,255,0.07); }
  .extra-btn svg { width: 16px; height: 16px; fill: var(--text-subdued); transition: fill 0.15s; }
  .extra-btn:hover svg { fill: white; }

  /* Playing animation */
  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 0 0 rgba(29,185,84,0); }
    50% { box-shadow: 0 0 0 6px rgba(29,185,84,0.15); }
  }

  .play-btn:active { transform: scale(0.96); }

  /* Scrollbar for main */
  .main { scroll-behavior: smooth; }

  /* Equalizer animation for active track */
  .eq-bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    height: 16px;
  }

  .eq-bar {
    width: 3px;
    background: var(--green);
    border-radius: 1px;
    animation: eq-anim 0.8s ease-in-out infinite alternate;
  }

  .eq-bar:nth-child(1) { animation-delay: 0s; }
  .eq-bar:nth-child(2) { animation-delay: 0.15s; }
  .eq-bar:nth-child(3) { animation-delay: 0.3s; }

  @keyframes eq-anim {
    from { height: 4px; }
    to { height: 14px; }
  }

  /* Color palette for placeholders */
  .c1 { background: linear-gradient(135deg, #7B3F9E, #4A148C); }
  .c2 { background: linear-gradient(135deg, #1565C0, #0D47A1); }
  .c3 { background: linear-gradient(135deg, #B71C1C, #880E4F); }
  .c4 { background: linear-gradient(135deg, #1B5E20, #004D40); }
  .c5 { background: linear-gradient(135deg, #E65100, #BF360C); }
  .c6 { background: linear-gradient(135deg, #006064, #004D40); }
  .c7 { background: linear-gradient(135deg, #4A148C, #1A237E); }
  .c8 { background: linear-gradient(135deg, #33691E, #1B5E20); }
  .c9 { background: linear-gradient(135deg, #37474F, #263238); }
  .c10 { background: linear-gradient(135deg, #880E4F, #4A148C); }

  /* Grid note icon */
  .note-icon { font-size: 24px; }
</style>
</head>
<body>

<!-- ===== SIDEBAR ===== -->
